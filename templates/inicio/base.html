{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Quiniela Mundial 2026{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'inicio/css/style.css' %}">
</head>
<body>
  <header class="topbar">
    <a href="{% url 'inicio:home' %}" class="brand">⚽ Quiniela 2026</a>
    <nav>
      <a href="{% url 'inicio:home' %}">Inicio</a>
      <a href="{% url 'inicio:choose_participant' %}">Mis predicciones</a>
      <form method="post" action="{% url 'inicio:sync_now' %}" style="display:inline">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.path }}">
        <button class="link-btn" type="submit">Sincronizar API</button>
      </form>
    </nav>
  </header>

  {% if messages %}
    <div class="messages">
      {% for m in messages %}
        <div class="msg msg-{{ m.tags }}">{{ m }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <small>Data: wc2026api.com · Mundial 2026 · Demo Django</small>
  </footer>
</body>
</html>
