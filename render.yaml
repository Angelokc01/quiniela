services:
  - type: web
    name: quiniela-web
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn quiniela.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: quiniela-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://quiniela-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: quiniela-db
          property: connectionString
      - key: WC2026_API_URL
        value: https://api.wc2026api.com
      - key: WC2026_API_TOKEN
        sync: false

  - type: cron
    name: quiniela-sync-matches
    env: python
    plan: starter
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py sync_matches
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiniela-db
          property: connectionString
      - key: WC2026_API_URL
        value: https://api.wc2026api.com
      - key: WC2026_API_TOKEN
        sync: false

databases:
  - name: quiniela-db
    plan: free
    databaseName: quiniela
    user: quiniela
