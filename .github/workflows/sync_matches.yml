name: Sync Matches

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-matches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync_matches
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'False'
          DATABASE_URL: ${{ secrets.DATABASE_URL_EXTERNAL }}
          WC2026_API_URL: https://api.wc2026api.com
          WC2026_API_TOKEN: ${{ secrets.WC2026_API_TOKEN }}
        run: python manage.py sync_matches
